; PlatformIO-Konfiguration für adora-device Library
; Hauptzweck: Native Tests (TankSteering etc.) + Build-Validierung

[platformio]
default_envs = native

; === Native Tests (kein Arduino, kein MCU) ===
; Nutzt den System-Compiler (macOS/Linux: clang/gcc).
[env:native]
platform = native
build_flags = -std=c++14

; === Native Tests auf Windows (kein System-Compiler vorausgesetzt) ===
[env:native_win]
extends = env:native
platform_packages = toolchain-gccmingw32

; === ESP8266 Build-Validierung ===
[env:esp8266_check]
platform = espressif8266
board = d1_mini
framework = arduino
build_flags =
    -DADORA_BOARD=ADORA_BOARD_ORIG
    -I../../protocol/contracts/v1
lib_deps =
    adafruit/Adafruit NeoPixel
